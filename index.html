<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ping Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #score {
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 8px;
    margin-bottom: 8px;
  }
  #ui {
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  canvas {
    display: block;
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    touch-action: none;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    z-index: 10;
    text-align: center;
    padding: 24px;
  }
  #overlay h1 { font-size: 36px; letter-spacing: 6px; margin-bottom: 10px; text-transform: uppercase; }
  #overlay p { font-size: 14px; opacity: 0.55; margin-bottom: 32px; letter-spacing: 1px; max-width: 280px; line-height: 1.7; }
  #overlay .result { font-size: 22px; margin-bottom: 6px; }
  #overlay .final { font-size: 13px; opacity: 0.5; margin-bottom: 28px; }
  #overlay button {
    background: #fff; color: #000; border: none;
    padding: 15px 38px; font-size: 15px;
    font-family: 'Courier New', monospace;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; border-radius: 4px; font-weight: bold;
  }
  #overlay button:active { transform: scale(0.96); }
  .hint { margin-top: 14px; font-size: 11px; opacity: 0.3; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="score">0 &nbsp;:&nbsp; 0</div>
<div id="ui">slide to move · first to 7 wins</div>
<canvas id="c"></canvas>

<div id="overlay" id="overlay">
  <h1>🏓 Pong</h1>
  <p>You are the <strong>white</strong> bottom paddle.<br>Slide anywhere on screen to move.<br>First to <strong>7 points</strong> wins.</p>
  <button id="startBtn">Start</button>
  <div class="hint">mouse also works on desktop</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const overlay  = document.getElementById('overlay');
const scoreEl  = document.getElementById('score');

const WIN_SCORE   = 7;
const PADDLE_H    = 13;
const PADDLE_WRAT = 0.30;
const BALL_R      = 8;
const BASE_SPEED  = () => canvas.width * 0.0075;
const MAX_SPEED   = () => canvas.width * 0.022;  // hard cap — prevents tunneling

let playerScore = 0, aiScore = 0;
let running = false, animId = null;
let ball = {}, player = {}, ai = {};

// ── Sizing ────────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = Math.min(window.innerWidth  - 16, 480);
  canvas.height = Math.min(window.innerHeight - 95, 720);
}
resize();
window.addEventListener('resize', () => { resize(); if (running) initRound(ball.vy < 0 ? -1 : 1); });

// ── Paddle helpers ────────────────────────────────────────────────────────────
function paddleW() { return canvas.width * PADDLE_WRAT; }

function makePaddles() {
  const pw = paddleW();
  player = { x: canvas.width / 2 - pw / 2, y: canvas.height - 28, w: pw, h: PADDLE_H };
  ai     = { x: canvas.width / 2 - pw / 2, y: 15,                  w: pw, h: PADDLE_H };
}

// ── Ball reset ────────────────────────────────────────────────────────────────
function initRound(dir = 1) {
  makePaddles();
  const angleDeg = (Math.random() * 50 - 25);   // –25..+25° from vertical
  const angle    = angleDeg * Math.PI / 180;
  const spd      = BASE_SPEED();
  ball = {
    x:  canvas.width  / 2,
    y:  canvas.height / 2,
    vx: spd * Math.sin(angle),
    vy: spd * dir,
    lastHitTime: 0   // cooldown guard
  };
}

// ── Touch / mouse input ───────────────────────────────────────────────────────
// Strategy: finger/mouse X maps directly to paddle center — no offset trickery.
let inputX = null;

function setInputX(clientX) {
  const rect = canvas.getBoundingClientRect();
  const scale = canvas.width / rect.width;           // handle CSS scaling
  inputX = (clientX - rect.left) * scale;
}

// Touch: respond to any touch on the page so player doesn't have to hit the paddle
document.addEventListener('touchstart',  e => { e.preventDefault(); setInputX(e.touches[0].clientX); }, { passive: false });
document.addEventListener('touchmove',   e => { e.preventDefault(); setInputX(e.touches[0].clientX); }, { passive: false });
document.addEventListener('touchend',    ()  => { inputX = null; });
document.addEventListener('mousedown',   e   => { setInputX(e.clientX); });
document.addEventListener('mousemove',   e   => { if (e.buttons) setInputX(e.clientX); });
document.addEventListener('mouseup',     ()  => { inputX = null; });

function applyInput() {
  if (inputX === null) return;
  // Paddle center follows finger
  const target = inputX - player.w / 2;
  player.x = Math.max(0, Math.min(canvas.width - player.w, target));
}

// ── AI ────────────────────────────────────────────────────────────────────────
function moveAI() {
  const pw     = paddleW();
  const center = ai.x + pw / 2;
  // AI speed is 55% of ball speed — always beatable, scales naturally
  const aiSpd  = Math.sqrt(ball.vx ** 2 + ball.vy ** 2) * 0.55;

  if (ball.vy < 0) {
    // Ball heading toward AI
    if (center < ball.x - 3) ai.x = Math.min(canvas.width - pw, ai.x + aiSpd);
    else if (center > ball.x + 3) ai.x = Math.max(0, ai.x - aiSpd);
  } else {
    // Drift back to center lazily
    const mid = canvas.width / 2 - pw / 2;
    ai.x += (mid - ai.x) * 0.025;
  }
}

// ── Collision ─────────────────────────────────────────────────────────────────
function collide(paddle) {
  const now = performance.now();
  // AABB check
  if (ball.x + BALL_R <= paddle.x || ball.x - BALL_R >= paddle.x + paddle.w) return;
  if (ball.y + BALL_R <= paddle.y || ball.y - BALL_R >= paddle.y + paddle.h) return;

  // Cooldown: ignore if we just bounced off this same paddle (prevents sticking)
  if (now - ball.lastHitTime < 120) return;
  ball.lastHitTime = now;

  // Relative hit position on paddle [-1, +1]
  const rel      = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
  const maxAngle = 60 * Math.PI / 180;
  const angle    = Math.max(-maxAngle, Math.min(maxAngle, rel * maxAngle));

  // New speed: +3% per hit, capped hard
  const curSpd = Math.sqrt(ball.vx ** 2 + ball.vy ** 2);
  const newSpd = Math.min(curSpd * 1.03, MAX_SPEED());

  // Direction: always bounce away from the paddle
  const goingDown = ball.y < paddle.y + paddle.h / 2;  // ball center above paddle center
  ball.vx = newSpd *  Math.sin(angle);
  ball.vy = newSpd * (goingDown ? 1 : -1) * Math.cos(angle);

  // Eject ball cleanly outside paddle
  if (ball.vy > 0) ball.y = paddle.y - BALL_R - 1;
  else             ball.y = paddle.y + paddle.h + BALL_R + 1;
}

// ── Score / end ───────────────────────────────────────────────────────────────
function updateScore() {
  scoreEl.innerHTML = `${playerScore} &nbsp;:&nbsp; ${aiScore}`;
}

function endGame(msg) {
  running = false;
  overlay.innerHTML = `
    <div class="result">${msg}</div>
    <h1>Game Over</h1>
    <p class="final">Final score: You ${playerScore} – ${aiScore} AI</p>
    <button id="startBtn">Play Again</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', startGame);
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop() {
  if (!running) return;

  applyInput();
  moveAI();

  // Sub-step movement: split into 2 steps to catch fast-ball collisions
  for (let i = 0; i < 2; i++) {
    ball.x += ball.vx / 2;
    ball.y += ball.vy / 2;

    // Side walls
    if (ball.x - BALL_R < 0)              { ball.x = BALL_R;                ball.vx =  Math.abs(ball.vx); }
    if (ball.x + BALL_R > canvas.width)   { ball.x = canvas.width - BALL_R; ball.vx = -Math.abs(ball.vx); }

    collide(player);
    collide(ai);
  }

  // Scoring
  if (ball.y - BALL_R > canvas.height) {
    aiScore++;
    updateScore();
    if (aiScore >= WIN_SCORE) { endGame('😔 AI wins'); return; }
    initRound(1);
  }
  if (ball.y + BALL_R < 0) {
    playerScore++;
    updateScore();
    if (playerScore >= WIN_SCORE) { endGame('🎉 You win!'); return; }
    initRound(-1);
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Dashed center line
  ctx.setLineDash([5, 9]);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height / 2);
  ctx.lineTo(canvas.width, canvas.height / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  const r = PADDLE_H / 2;
  function drawPaddle(p, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(p.x, p.y, p.w, p.h, r);
    ctx.fill();
  }
  drawPaddle(player, '#ffffff');
  drawPaddle(ai,     '#ff4444');

  // Ball (with subtle glow)
  ctx.shadowColor = 'rgba(255,255,255,0.6)';
  ctx.shadowBlur  = 8;
  ctx.fillStyle   = '#ffffff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  animId = requestAnimationFrame(loop);
}

// ── Start ─────────────────────────────────────────────────────────────────────
function startGame() {
  playerScore = 0; aiScore = 0;
  updateScore();
  initRound(1);
  running = true;
  overlay.style.display = 'none';
  if (animId) cancelAnimationFrame(animId);
  loop();
}

document.getElementById('startBtn').addEventListener('click', startGame);
</script>
</body>
</html>
